services:
  pdf-parser:
    build:
      context: .
      dockerfile: ./mev-pdf-parser/Dockerfile
    image: mev-pdf-parser:latest
    container_name: mev-pdf-parser
    restart: unless-stopped
    environment:
      - PORT=8765
    ports:
      - "8765:8765"

  backend:
    build:
      context: ./mev-governance-backend
      dockerfile: Dockerfile
    image: mev-backend:latest
    container_name: mev-backend
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - JWT_KEY=MEV-Governance-SuperSecretKey-2025-Capgemini!
      - JWT_ISSUER=mev-governance
      - JWT_AUDIENCE=mev-governance-ui
      - DATABASE_PATH=/data/mev.db
      - PDF_PARSER_URL=http://pdf-parser:8765
    volumes:
      - /share/Public/mev-data:/data
    ports:
      - "8081:5000"
    depends_on:
      - pdf-parser

  frontend:
    build:
      context: ./mev-governance-ui
      dockerfile: Dockerfile
    image: mev-frontend:latest
    container_name: mev-frontend
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - backend
